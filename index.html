<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔐 KV Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3250;
      --accent:    #0078d4;
      --accent-h:  #106ebe;
      --danger:    #d13438;
      --success:   #107c10;
      --warning:   #ca5010;
      --text:      #e8eaf0;
      --muted:     #7b8099;
      --radius:    8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100vh; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    .badge.ok  { background: var(--success); }
    .badge.err { background: var(--danger); }

    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-section { padding: 12px; border-bottom: 1px solid var(--border); }
    .sidebar-section label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }

    select, input[type="text"], input[type="password"], textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    select:focus, input:focus, textarea:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }

    .vault-list { flex: 1; overflow-y: auto; padding: 8px; }
    .vault-item {
      padding: 9px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .12s;
      border: 1px solid transparent;
    }
    .vault-item:hover { background: var(--surface2); }
    .vault-item.active { background: var(--surface2); border-color: var(--accent); }
    .vault-item .vault-name { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .vault-item .vault-rg  { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .vault-icon { font-size: 16px; flex-shrink: 0; }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 20px; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .toolbar-title { font-size: 16px; font-weight: 700; flex: 1; }

    .search-box { position: relative; }
    .search-box input { padding-left: 30px; width: 220px; }
    .search-box::before { content: '🔍'; position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 12px; }

    /* ── Buttons ── */
    button {
      border: none;
      border-radius: var(--radius);
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .12s, opacity .12s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary   { background: var(--accent);   color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }
    .btn-danger    { background: var(--danger);   color: #fff; }
    .btn-danger:hover:not(:disabled)  { background: #a4262c; }
    .btn-ghost     { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled)   { background: var(--surface2); }
    .btn-success   { background: var(--success);  color: #fff; }
    .btn-sm        { padding: 4px 10px; font-size: 12px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface2); }
    th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
    td { padding: 10px 14px; border-top: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,.02); }

    .secret-value-cell { display: flex; align-items: center; gap: 8px; }
    .secret-value-text {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      background: var(--surface2);
      padding: 3px 8px;
      border-radius: 4px;
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .masked { letter-spacing: 3px; color: var(--muted); }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .tag-green  { background: rgba(16,124,16,.2);  color: #54b054; }
    .tag-red    { background: rgba(209,52,56,.2);   color: #f87171; }
    .tag-blue   { background: rgba(0,120,212,.2);   color: #60a5fa; }
    .tag-orange { background: rgba(202,80,16,.2);   color: #fb923c; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 520px;
      padding: 24px;
    }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
    .form-group textarea { resize: vertical; min-height: 80px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .tab {
      padding: 8px 16px;
      border-radius: var(--radius) var(--radius) 0 0;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      border: 1px solid transparent;
      border-bottom: none;
      background: transparent;
      transition: color .12s;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--text);
      background: var(--surface);
      border-color: var(--border);
      border-bottom-color: var(--surface);
      margin-bottom: -1px;
    }

    /* ── Misc ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      display: flex; align-items: center; gap: 10px;
      font-size: 13px;
      z-index: 9999;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      animation: slideIn .2s ease;
      max-width: 360px;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--accent); }
    @keyframes slideIn { from { transform: translateY(12px); opacity:0; } to { transform: translateY(0); opacity:1; } }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .copy-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 2px 6px;
      cursor: pointer;
      font-size: 13px;
      border-radius: 4px;
    }
    .copy-btn:hover { color: var(--text); background: var(--surface2); }

    .action-btns { display: flex; gap: 6px; }

    .bulk-area textarea { min-height: 160px; }
    .bulk-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

    .results-list { max-height: 200px; overflow-y: auto; margin-top: 10px; }
    .result-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const API = '';

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
    ...(body ? { body: JSON.stringify(body) } : {})
  };
  const res = await fetch(`${API}/api${path}`, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ── Toast ─────────────────────────────────────────────────────────────────
function Toast({ toasts }) {
  if (!toasts.length) return null;
  const t = toasts[toasts.length - 1];
  return (
    <div className={`toast ${t.type}`}>
      {t.type === 'success' && '✅'}
      {t.type === 'error'   && '❌'}
      {t.type === 'info'    && 'ℹ️'}
      <span>{t.msg}</span>
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const toast = useCallback((msg, type = 'info') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  }, []);
  return { toasts, toast };
}

// ── Secret Modal (Add / Edit) ─────────────────────────────────────────────
function SecretModal({ vault, secret, onClose, onSaved, toast }) {
  const [name, setName]           = useState(secret?.name || '');
  const [value, setValue]         = useState('');
  const [contentType, setContent] = useState(secret?.contentType || '');
  const [loading, setLoading]     = useState(false);
  const [fetching, setFetching]   = useState(!!secret);

  useEffect(() => {
    if (!secret) return;
    setFetching(true);
    api('GET', `/secrets/${vault}/${secret.name}/value`)
      .then(d => { setValue(d.value); setContent(d.contentType || ''); })
      .catch(e => toast(e.message, 'error'))
      .finally(() => setFetching(false));
  }, []);

  async function save() {
    if (!name.trim()) return toast('Secret name is required', 'error');
    setLoading(true);
    try {
      await api('PUT', `/secrets/${vault}/${name.trim()}`, { value, contentType });
      toast(`Secret "${name}" saved`, 'success');
      onSaved();
      onClose();
    } catch(e) {
      toast(e.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h2>{secret ? '✏️ Edit Secret' : '➕ New Secret'}</h2>
        {fetching ? (
          <div style={{textAlign:'center',padding:'40px 0'}}><div className="spinner" style={{width:32,height:32,margin:'0 auto'}}/></div>
        ) : (
          <>
            <div className="form-group">
              <label>Secret Name</label>
              <input
                type="text"
                value={name}
                onChange={e => setName(e.target.value)}
                placeholder="MySecretName"
                disabled={!!secret}
              />
            </div>
            <div className="form-group">
              <label>Value</label>
              <textarea
                value={value}
                onChange={e => setValue(e.target.value)}
                placeholder="Secret value..."
                rows={5}
              />
            </div>
            <div className="form-group">
              <label>Content Type <span style={{color:'var(--muted)',fontWeight:400}}>(optional)</span></label>
              <input
                type="text"
                value={contentType}
                onChange={e => setContent(e.target.value)}
                placeholder="e.g. ConnectionString, ApiKey, Password"
              />
            </div>
          </>
        )}
        <div className="modal-footer">
          <button className="btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={save} disabled={loading || fetching}>
            {loading ? <><span className="spinner"/>Saving…</> : '💾 Save Secret'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Bulk Import Modal ─────────────────────────────────────────────────────
function BulkModal({ vault, onClose, onDone, toast }) {
  const [csv, setCsv]         = useState('');
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);

  async function runImport() {
    const lines = csv.trim().split('\n').filter(Boolean);
    const secrets = lines.map(line => {
      const parts = line.split(',');
      return {
        name:        (parts[0] || '').trim(),
        value:       (parts[1] || '').trim(),
        contentType: (parts[2] || '').trim()
      };
    }).filter(s => s.name && s.value);

    if (!secrets.length) return toast('No valid rows found. Format: Name,Value,ContentType', 'error');

    setLoading(true);
    try {
      const res = await api('POST', `/secrets/${vault}/bulk`, { secrets });
      setResults(res.results);
      const ok  = res.results.filter(r => r.status === 'success').length;
      const bad = res.results.filter(r => r.status === 'failed').length;
      toast(`Imported ${ok} secrets${bad ? `, ${bad} failed` : ''}`, bad ? 'error' : 'success');
      onDone();
    } catch(e) {
      toast(e.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:600}}>
        <h2>📥 Bulk Import Secrets</h2>
        <div className="form-group bulk-area">
          <label>CSV Data — one secret per line</label>
          <textarea
            value={csv}
            onChange={e => setCsv(e.target.value)}
            placeholder={`SecretName,SecretValue,ContentType\nDbConnString,Server=tcp:mydb.database.windows.net,ConnectionString\nMailgunKey,key-abc123,ApiKey\nAppInsightsKey,guid-here,InstrumentationKey`}
          />
          <div className="bulk-hint">Format: <code>Name,Value,ContentType</code> — ContentType is optional. Header row is ignored if present.</div>
        </div>

        {results && (
          <div className="results-list">
            {results.map(r => (
              <div className="result-item" key={r.name}>
                <span>{r.status === 'success' ? '✅' : '❌'}</span>
                <span style={{fontWeight:500}}>{r.name}</span>
                {r.error && <span style={{color:'var(--danger)',fontSize:11}}>{r.error}</span>}
              </div>
            ))}
          </div>
        )}

        <div className="modal-footer">
          <button className="btn-ghost" onClick={onClose}>Close</button>
          <button className="btn-primary" onClick={runImport} disabled={loading || !csv.trim()}>
            {loading ? <><span className="spinner"/>Importing…</> : '📥 Import'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Copy Between Vaults Modal ─────────────────────────────────────────────
function CopyModal({ vaults, currentVault, selectedSecrets, onClose, toast }) {
  const [target, setTarget]   = useState('');
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(null);

  async function doCopy() {
    if (!target) return toast('Select a target vault', 'error');
    setLoading(true);
    try {
      const res = await api('POST', '/copy', {
        sourceVault: currentVault,
        targetVault: target,
        secretNames: selectedSecrets
      });
      setResults(res.results);
      const ok = res.results.filter(r => r.status === 'success').length;
      toast(`Copied ${ok} of ${selectedSecrets.length} secrets`, ok === selectedSecrets.length ? 'success' : 'error');
    } catch(e) {
      toast(e.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="modal-backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <h2>📋 Copy Secrets to Another Vault</h2>
        <p style={{color:'var(--muted)',fontSize:13,marginBottom:16}}>
          Copying <strong style={{color:'var(--text)'}}>{selectedSecrets.length}</strong> secret{selectedSecrets.length !== 1 ? 's' : ''} from <strong style={{color:'var(--text)'}}>{currentVault}</strong>
        </p>
        <div className="form-group">
          <label>Target Vault</label>
          <select value={target} onChange={e => setTarget(e.target.value)}>
            <option value="">— Select vault —</option>
            {vaults.filter(v => v.name !== currentVault).map(v => (
              <option key={v.name} value={v.name}>{v.name} ({v.resourceGroup})</option>
            ))}
          </select>
        </div>

        {results && (
          <div className="results-list">
            {results.map(r => (
              <div className="result-item" key={r.name}>
                <span>{r.status === 'success' ? '✅' : '❌'}</span>
                <span style={{fontWeight:500}}>{r.name}</span>
                {r.error && <span style={{color:'var(--danger)',fontSize:11}}>{r.error}</span>}
              </div>
            ))}
          </div>
        )}

        <div className="modal-footer">
          <button className="btn-ghost" onClick={onClose}>Close</button>
          <button className="btn-primary" onClick={doCopy} disabled={loading || !target}>
            {loading ? <><span className="spinner"/>Copying…</> : '📋 Copy'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Secrets Table ─────────────────────────────────────────────────────────
function SecretsView({ vault, allVaults, toast }) {
  const [secrets, setSecrets]     = useState([]);
  const [loading, setLoading]     = useState(true);
  const [search, setSearch]       = useState('');
  const [revealed, setRevealed]   = useState({});
  const [loadingVal, setLoadingVal] = useState({});
  const [modal, setModal]         = useState(null); // null | 'add' | 'edit' | 'bulk' | 'copy'
  const [editSecret, setEditSecret] = useState(null);
  const [selected, setSelected]   = useState(new Set());

  const load = useCallback(() => {
    setLoading(true);
    setRevealed({});
    setSelected(new Set());
    api('GET', `/secrets/${vault}`)
      .then(setSecrets)
      .catch(e => toast(e.message, 'error'))
      .finally(() => setLoading(false));
  }, [vault]);

  useEffect(() => { load(); }, [load]);

  async function revealSecret(name) {
    if (revealed[name] !== undefined) {
      setRevealed(p => { const n = {...p}; delete n[name]; return n; });
      return;
    }
    setLoadingVal(p => ({...p, [name]: true}));
    try {
      const d = await api('GET', `/secrets/${vault}/${name}/value`);
      setRevealed(p => ({...p, [name]: d.value}));
    } catch(e) {
      toast(e.message, 'error');
    } finally {
      setLoadingVal(p => ({...p, [name]: false}));
    }
  }

  async function deleteSecret(name) {
    if (!confirm(`Delete secret "${name}" from ${vault}?\n\nThis uses soft-delete and can be recovered.`)) return;
    try {
      await api('DELETE', `/secrets/${vault}/${name}`);
      toast(`"${name}" deleted (soft-delete)`, 'success');
      load();
    } catch(e) {
      toast(e.message, 'error');
    }
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => toast('Copied to clipboard', 'success'));
  }

  function toggleSelect(name) {
    setSelected(p => {
      const n = new Set(p);
      n.has(name) ? n.delete(name) : n.add(name);
      return n;
    });
  }

  function toggleAll() {
    setSelected(p => p.size === filtered.length ? new Set() : new Set(filtered.map(s => s.name)));
  }

  const filtered = secrets.filter(s =>
    s.name.toLowerCase().includes(search.toLowerCase()) ||
    (s.contentType || '').toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div>
      {modal === 'add'  && <SecretModal vault={vault} secret={null}      onClose={() => setModal(null)} onSaved={load} toast={toast} />}
      {modal === 'edit' && <SecretModal vault={vault} secret={editSecret} onClose={() => setModal(null)} onSaved={load} toast={toast} />}
      {modal === 'bulk' && <BulkModal   vault={vault} onClose={() => setModal(null)} onDone={load} toast={toast} />}
      {modal === 'copy' && (
        <CopyModal
          vaults={allVaults}
          currentVault={vault}
          selectedSecrets={[...selected]}
          onClose={() => setModal(null)}
          toast={toast}
        />
      )}

      <div className="toolbar">
        <span className="toolbar-title">🔐 {vault}</span>
        <div className="search-box">
          <input type="text" placeholder="Search secrets…" value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        {selected.size > 0 && (
          <button className="btn-ghost btn-sm" onClick={() => setModal('copy')}>
            📋 Copy {selected.size} selected
          </button>
        )}
        <button className="btn-ghost btn-sm" onClick={() => setModal('bulk')}>📥 Bulk Import</button>
        <button className="btn-primary btn-sm" onClick={() => setModal('add')}>➕ Add Secret</button>
        <button className="btn-ghost btn-sm" onClick={load} title="Refresh">🔄</button>
      </div>

      {loading ? (
        <div style={{textAlign:'center',padding:'60px 0'}}>
          <div className="spinner" style={{width:32,height:32,margin:'0 auto'}}/>
          <p style={{color:'var(--muted)',marginTop:12}}>Loading secrets…</p>
        </div>
      ) : filtered.length === 0 ? (
        <div className="empty-state">
          <div className="icon">{secrets.length === 0 ? '🔒' : '🔍'}</div>
          <p>{secrets.length === 0 ? 'No secrets in this vault' : 'No secrets match your search'}</p>
        </div>
      ) : (
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th style={{width:36}}>
                  <input
                    type="checkbox"
                    checked={selected.size === filtered.length && filtered.length > 0}
                    onChange={toggleAll}
                    style={{width:'auto',cursor:'pointer'}}
                  />
                </th>
                <th>Name</th>
                <th>Value</th>
                <th>Content Type</th>
                <th>Status</th>
                <th>Updated</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(s => (
                <tr key={s.name}>
                  <td>
                    <input
                      type="checkbox"
                      checked={selected.has(s.name)}
                      onChange={() => toggleSelect(s.name)}
                      style={{width:'auto',cursor:'pointer'}}
                    />
                  </td>
                  <td>
                    <span style={{fontFamily:"'SF Mono','Fira Code',monospace",fontSize:12}}>{s.name}</span>
                  </td>
                  <td>
                    <div className="secret-value-cell">
                      {loadingVal[s.name] ? (
                        <span className="spinner"/>
                      ) : revealed[s.name] !== undefined ? (
                        <>
                          <span className="secret-value-text">{revealed[s.name]}</span>
                          <button className="copy-btn" onClick={() => copyToClipboard(revealed[s.name])} title="Copy value">📋</button>
                        </>
                      ) : (
                        <span className="secret-value-text masked">••••••••••••</span>
                      )}
                      <button
                        className="copy-btn"
                        onClick={() => revealSecret(s.name)}
                        title={revealed[s.name] !== undefined ? 'Hide' : 'Reveal'}
                      >
                        {revealed[s.name] !== undefined ? '🙈' : '👁️'}
                      </button>
                    </div>
                  </td>
                  <td>
                    {s.contentType
                      ? <span className="tag tag-blue">{s.contentType}</span>
                      : <span style={{color:'var(--muted)'}}>—</span>
                    }
                  </td>
                  <td>
                    <span className={`tag ${s.enabled ? 'tag-green' : 'tag-red'}`}>
                      {s.enabled ? 'Enabled' : 'Disabled'}
                    </span>
                  </td>
                  <td style={{color:'var(--muted)',fontSize:12}}>
                    {s.updated ? new Date(s.updated * 1000).toLocaleDateString() : '—'}
                  </td>
                  <td>
                    <div className="action-btns">
                      <button className="btn-ghost btn-sm" onClick={() => { setEditSecret(s); setModal('edit'); }}>✏️ Edit</button>
                      <button className="btn-danger btn-sm" onClick={() => deleteSecret(s.name)}>🗑️</button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
      <div style={{marginTop:10,color:'var(--muted)',fontSize:12}}>
        {filtered.length} secret{filtered.length !== 1 ? 's' : ''}{search ? ' (filtered)' : ''} · {selected.size} selected
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────
function App() {
  const { toasts, toast } = useToast();

  const [health, setHealth]   = useState(null);
  const [subs, setSubs]       = useState([]);
  const [subId, setSubId]     = useState('');
  const [vaults, setVaults]   = useState([]);
  const [vault, setVault]     = useState(null);
  const [vaultSearch, setVaultSearch] = useState('');
  const [loadingSubs, setLoadingSubs]   = useState(true);
  const [loadingVaults, setLoadingVaults] = useState(false);

  // Check health / login status
  useEffect(() => {
    api('GET', '/health')
      .then(setHealth)
      .catch(() => setHealth({ status: 'error' }))
      .finally(() => setLoadingSubs(false));

    api('GET', '/subscriptions')
      .then(data => {
        setSubs(data);
        const def = data.find(s => s.isDefault) || data[0];
        if (def) setSubId(def.id);
      })
      .catch(e => toast(e.message, 'error'))
      .finally(() => setLoadingSubs(false));
  }, []);

  // Load vaults when subscription changes
  useEffect(() => {
    if (!subId) return;
    setVault(null);
    setVaults([]);
    setLoadingVaults(true);
    api('GET', `/vaults/${subId}`)
      .then(setVaults)
      .catch(e => toast(e.message, 'error'))
      .finally(() => setLoadingVaults(false));
  }, [subId]);

  const filteredVaults = vaults.filter(v =>
    v.name.toLowerCase().includes(vaultSearch.toLowerCase()) ||
    v.resourceGroup.toLowerCase().includes(vaultSearch.toLowerCase())
  );

  return (
    <div className="app">
      {/* Top Bar */}
      <div className="topbar">
        <div className="topbar-left">
          <div className="logo">🔐 KV Manager</div>
          {health && (
            <span className={`badge ${health.status === 'ok' ? 'ok' : 'err'}`}>
              {health.status === 'ok' ? `✓ ${health.loggedInAs}` : '✗ Not logged in'}
            </span>
          )}
        </div>
        {health?.status !== 'ok' && (
          <div style={{color:'var(--warning)',fontSize:12}}>
            ⚠️ Run <code style={{background:'var(--surface2)',padding:'2px 6px',borderRadius:4}}>az login</code> then restart the server
          </div>
        )}
      </div>

      <div className="main">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="sidebar-section">
            <label>Subscription</label>
            {loadingSubs ? (
              <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',color:'var(--muted)'}}>
                <span className="spinner"/><span>Loading…</span>
              </div>
            ) : (
              <select value={subId} onChange={e => setSubId(e.target.value)}>
                {subs.map(s => (
                  <option key={s.id} value={s.id}>{s.name}</option>
                ))}
              </select>
            )}
          </div>

          {subs.length > 0 && (
            <div className="sidebar-section" style={{paddingBottom:8}}>
              <label>Key Vaults {vaults.length > 0 && `(${vaults.length})`}</label>
              <input
                type="text"
                placeholder="Filter vaults…"
                value={vaultSearch}
                onChange={e => setVaultSearch(e.target.value)}
              />
            </div>
          )}

          <div className="vault-list">
            {loadingVaults ? (
              <div style={{textAlign:'center',padding:'30px 0',color:'var(--muted)'}}>
                <span className="spinner" style={{width:20,height:20,display:'inline-block'}}/><br/>
                <span style={{fontSize:12,marginTop:8,display:'block'}}>Loading vaults…</span>
              </div>
            ) : filteredVaults.length === 0 && subId ? (
              <div style={{textAlign:'center',padding:'30px 0',color:'var(--muted)',fontSize:12}}>
                {vaultSearch ? 'No vaults match filter' : 'No Key Vaults found'}
              </div>
            ) : (
              filteredVaults.map(v => (
                <div
                  key={v.name}
                  className={`vault-item ${vault === v.name ? 'active' : ''}`}
                  onClick={() => setVault(v.name)}
                >
                  <span className="vault-icon">🔒</span>
                  <div style={{overflow:'hidden'}}>
                    <div className="vault-name">{v.name}</div>
                    <div className="vault-rg">{v.resourceGroup}</div>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>

        {/* Main Content */}
        <div className="content">
          {!vault ? (
            <div className="empty-state" style={{marginTop:60}}>
              <div className="icon">👈</div>
              <p style={{fontSize:16,fontWeight:600,marginBottom:8}}>Select a Key Vault</p>
              <p>Choose a vault from the sidebar to view and manage its secrets</p>
              {health?.status === 'error' && (
                <div style={{marginTop:24,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:20,maxWidth:400,margin:'24px auto 0',textAlign:'left'}}>
                  <p style={{fontWeight:600,marginBottom:8,color:'var(--warning)'}}>⚠️ Not logged in</p>
                  <p style={{color:'var(--muted)',fontSize:13}}>Run this in your terminal then restart the server:</p>
                  <code style={{display:'block',background:'var(--surface2)',padding:'8px 12px',borderRadius:6,marginTop:8,fontSize:13}}>az login</code>
                </div>
              )}
            </div>
          ) : (
            <SecretsView vault={vault} allVaults={vaults} toast={toast} />
          )}
        </div>
      </div>

      <Toast toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
